version: 2

sources:
  - name: raw
    database: MARKETING_ANALYTICS
    schema: RAW
    tables:
      - name: raw_meta_ads_insights
        description: "Raw Meta Ads Insights data loaded daily from synthetic API"
        columns:
          - name: ad_id
            description: "Unique ad identifier"
          - name: date_start
            description: "Report date"
          - name: spend
            description: "Amount spent in USD"
          - name: impressions
            description: "Number of impressions"
          - name: clicks
            description: "Number of clicks"
          - name: purchases
            description: "Number of subscription conversions"

  - name: raw_scrape
    database: MARKETING_ANALYST
    schema: RAW
    tables:
      - name: raw_press_releases
        description: "Paramount+ press releases scraped from paramountpressexpress.com"
        columns:
          - name: press_release_id
            description: "Unique identifier for each press release"
          - name: title
            description: "Press release title"
          - name: published_date
            description: "Date the press release was published"
          - name: url
            description: "URL of the press release"
          - name: full_text
            description: "Full text content of the press release"
